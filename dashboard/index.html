<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WorldCup Oracle · 2026 世界杯 AI 预测</title>
<meta name="description" content="三个时序基础模型 + Elo + 5万次蒙特卡洛：逐场预测 2026 世界杯胜平负与比分，并对比 Polymarket 市场赔率。">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
<header class="site-header">
  <div class="container header-row">
    <div>
      <h1>⚽ WorldCup Oracle</h1>
      <p class="subtitle">2026 世界杯 · AI 预测 vs Polymarket</p>
    </div>
    <div class="meta-box" id="meta-box"></div>
  </div>
  <nav class="tabs container" id="tabs">
    <button class="tab active" data-tab="matches">赛程预测</button>
    <button class="tab" data-tab="groups">小组积分</button>
    <button class="tab" data-tab="champions">夺冠概率</button>
    <button class="tab" data-tab="record">AI 战绩</button>
  </nav>
</header>

<main class="container">
  <section id="tab-matches" class="tab-panel">
    <div class="filter-row">
      <div class="chips" id="stage-chips">
        <button class="chip active" data-filter="upcoming">未来赛程</button>
        <button class="chip" data-filter="today">今天</button>
        <button class="chip" data-filter="group">小组赛</button>
        <button class="chip" data-filter="ko">淘汰赛</button>
        <button class="chip" data-filter="done">已结束</button>
        <button class="chip" data-filter="all">全部</button>
      </div>
      <input type="search" id="team-search" placeholder="搜索球队…">
    </div>
    <div id="match-list"></div>
  </section>

  <section id="tab-groups" class="tab-panel" hidden>
    <div class="group-grid" id="group-grid"></div>
  </section>

  <section id="tab-champions" class="tab-panel" hidden>
    <div class="legend" id="champ-legend"></div>
    <div id="champ-list"></div>
  </section>

  <section id="tab-record" class="tab-panel" hidden>
    <div id="record-summary" class="summary-cards"></div>
    <div id="record-details"></div>
  </section>
</main>

<footer class="site-footer container">
  <p>模型：Chronos-2 / TimesFM-2.5 / FlowState 三个时序基础模型预测球队 Elo 走势 → Bradley-Terry(Davidson) 胜平负 → 50,000 次蒙特卡洛（已赛结果实时注入，只模拟剩余赛程）。比分为 Elo→泊松模型最可能比分。</p>
  <p>实时比分来自 ESPN 公开接口；市场概率来自 Polymarket。仅供研究娱乐，不构成任何投注建议。</p>
  <p><a href="https://github.com/YSKM523/worldcup-oracle" target="_blank" rel="noopener">GitHub · YSKM523/worldcup-oracle</a></p>
</footer>

<script src="app.js"></script>
</body>
</html>
